name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag version (e.g., v3.0.0)'
        required: false
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  # Build web version
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Add pnpm to PATH
        run: echo "$HOME/setup-pnpm/node_modules/.bin" >> $GITHUB_PATH

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web
        run: pnpm build
        env:
          CI: true

      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: dist/

  # Build Tauri desktop app
  build-tauri:
    needs: build-web
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Add pnpm to PATH
        run: |
          echo "$HOME/setup-pnpm/node_modules/.bin" >> $GITHUB_PATH 2>/dev/null || true
          echo "~/setup-pnpm/node_modules/.bin" >> $GITHUB_PATH 2>/dev/null || true

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libffmpegthumbnailer-dev libjpeg-dev libvips-dev ffmpeg

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build
        env:
          CI: true

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'VisionSub ${{ github.ref_name }}'
          releaseBody: |
            ## VisionSub ${{ github.ref_name }}

            Professional video subtitle extraction tool.

            ### Features
            - 🎬 Video subtitle extraction via OCR
            - 🔍 Tesseract.js powered OCR
            - 📋 Multiple export formats (SRT, VTT, ASS, JSON, TXT)
            - ⌨️ Keyboard shortcuts
            - 🌈 Theme switching
            - 📦 Desktop + CLI dual mode

            ### Downloads
            - macOS (Apple Silicon)
            - macOS (Intel)
            - Linux
            - Windows

          artifacts: |
            .vite/dist
            src-tauri/target/release/bundle/
