<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="HardSubX Logo">
  <title>HardSubX</title>
  <desc>Professional video hard subtitle extraction tool</desc>
  <defs>
    <linearGradient id="lgBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#161B22"/>
    </linearGradient>
    <linearGradient id="lgBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4D9BFF"/>
      <stop offset="100%" stop-color="#0A84FF"/>
    </linearGradient>
    <linearGradient id="lgCyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00D4AA"/>
      <stop offset="100%" stop-color="#00FFD0"/>
    </linearGradient>
    <filter id="glowing">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Card background -->
  <rect x="0" y="0" width="200" height="200" rx="36" fill="url(#lgBg)"/>
  <!-- Border -->
  <rect x="1" y="1" width="198" height="198" rx="35" fill="none" stroke="#0A84FF" stroke-width="1" stroke-opacity="0.25"/>

  <!-- H left bar -->
  <rect x="30" y="28" width="22" height="110" rx="6" fill="url(#lgBlue)" filter="url(#glowing)"/>
  <!-- H right bar -->
  <rect x="82" y="28" width="22" height="110" rx="6" fill="url(#lgBlue)" filter="url(#glowing)"/>
  <!-- H crossbar -->
  <rect x="52" y="72" width="52" height="18" rx="4" fill="#1C1C21"/>

  <!-- X crosshairs targeting area -->
  <line x1="50" y1="34" x2="108" y2="86" stroke="#00D4AA" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
  <line x1="108" y1="34" x2="50" y2="86" stroke="#00D4AA" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
  <!-- Crosshair center dot -->
  <circle cx="79" cy="60" r="6" fill="none" stroke="#00FFD0" stroke-width="1.5" opacity="0.85"/>
  <circle cx="79" cy="60" r="2.5" fill="#00FFD0"/>

  <!-- Subtitle track bars (bottom of H) -->
  <rect x="44" y="108" width="64" height="5" rx="2.5" fill="url(#lgCyan)" opacity="0.95"/>
  <rect x="50" y="118" width="48" height="4" rx="2" fill="url(#lgCyan)" opacity="0.72"/>
  <rect x="55" y="127" width="36" height="3.5" rx="1.75" fill="url(#lgCyan)" opacity="0.48"/>

  <!-- Film frame notch (top-right) -->
  <rect x="136" y="22" width="44" height="32" rx="5" fill="none" stroke="#4D9BFF" stroke-width="1.5" stroke-opacity="0.55"/>
  <!-- Film notch cuts -->
  <rect x="136" y="22" width="12" height="9" rx="1.5" fill="#0D1117"/>
  <rect x="168" y="22" width="12" height="9" rx="1.5" fill="#0D1117"/>
  <!-- H inside film frame -->
  <rect x="148" y="29" width="5" height="16" rx="1.5" fill="#4D9BFF" opacity="0.7"/>
  <rect x="163" y="29" width="5" height="16" rx="1.5" fill="#4D9BFF" opacity="0.7"/>
  <rect x="153" y="36" width="10" height="4" rx="1" fill="#1C1C21"/>

  <!-- Brand text at bottom -->
  <text x="100" y="185" font-family="'JetBrains Mono','SF Mono','Consolas',monospace" font-size="11" font-weight="600" letter-spacing="3" fill="#4D9BFF" text-anchor="middle" opacity="0.8">HARDSUBX</text>

  <!-- Subtle separator line -->
  <rect x="40" y="166" width="120" height="1" rx="0.5" fill="#21262D"/>
</svg>
